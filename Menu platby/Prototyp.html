<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">

    <title>Finanční Dashboard - Váš Bankovní Portál</title>
    <style>
        /* === Reset a Globální Styly === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f9;
            color: #333;
        }
        /* === Layout === */
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background-color: #ffffff;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.05);
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex-grow: 1;
            padding: 30px;
        }
        /* === Sidebar Navigace === */
        .logo {
            padding: 0 20px 20px 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: #0056b3;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-item a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #555;
            font-size: 1rem;
            transition: background-color 0.2s, color 0.2s;
            cursor: pointer;
            border-left: 4px solid transparent;
        }
        .nav-item a:hover, .nav-item.active a {
            background-color: #e7f1ff;
            color: #0056b3;
            border-left: 4px solid #007bff;
        }
        /* === Sekce Obsah === */
        h1.page-title {
            color: #0056b3;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        }
        .card h3 {
            color: #0056b3;
            margin-bottom: 15px;
        }
        /* === Tabulky a Formy === */
        .data-section {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
        }
        .transaction-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .transaction-table th, .transaction-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .transaction-table th {
            background-color: #f4f7f9;
            font-weight: 600;
            color: #555;
        }
        .transaction-table tbody tr:hover {
            background-color: #f9f9f9;
        }
        .credit { color: #28a745; font-weight: bold; }
        .debit { color: #dc3545; font-weight: bold; }

        /* Specifické stylingy pro sekce */
        .balance-display {
            text-align: center;
            padding: 30px;
            background-color: #e8f0fe;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .balance-display h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .balance-display p {
            font-size: 3em;
            color: #0056b3;
            font-weight: 700;
        }
        /* Styling pro taby (navigace uvnitř hlavního obsahu) */
        .tab-navigation {
            display: flex;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
        }
        .tab-button {
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: border-bottom 0.2s;
            font-weight: 600;
            color: #666;
        }
        .tab-button.active {
            color: #0056b3;
            border-bottom: 3px solid #007bff;
        }
        .tab-content > div {
            padding: 15px;
        }
    </style>
</head>
